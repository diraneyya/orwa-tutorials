<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <rect width="1200" height="675" fill="#161616"/>
  <text x="600" y="60" fill="#4a9eff" font-size="36" font-weight="600" text-anchor="middle" direction="rtl">ماءُ النَّباتاتِ في البُرج</text>

  <defs>
    <linearGradient id="phbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d8704a"/>
      <stop offset="0.5" stop-color="#8fc79b"/>
      <stop offset="1" stop-color="#6f8fd8"/>
    </linearGradient>
  </defs>

  <!-- ===== LEFT: lemon (sour) ===== -->
  <g transform="translate(220,200)">
    <ellipse cx="0" cy="0" rx="80" ry="56" fill="#e8d04a"/>
    <ellipse cx="-22" cy="-18" rx="22" ry="10" fill="#f5e878" opacity="0.7"/>
    <path d="M-78 -3 Q -85 -10 -78 -18" stroke="#9aa867" stroke-width="4" fill="none" stroke-linecap="round"/>
    <text x="0" y="120" fill="#d8704a" font-size="34" font-weight="700" text-anchor="middle" direction="rtl">حامِض</text>
    <text x="0" y="160" fill="#c9d2db" font-size="22" text-anchor="middle" direction="rtl">مِثلَ اللَّيمون</text>
  </g>

  <!-- ===== MIDDLE: happy plant ===== -->
  <g transform="translate(600,200)">
    <!-- pot -->
    <path d="M-40 32 L 40 32 L 32 78 L -32 78 Z" fill="#8a5f3a"/>
    <!-- stem -->
    <line x1="0" y1="32" x2="0" y2="-8" stroke="#5fa05f" stroke-width="7" stroke-linecap="round"/>
    <!-- leaves -->
    <ellipse cx="-26" cy="-6" rx="24" ry="14" fill="#7ec77e" transform="rotate(-30 -26 -6)"/>
    <ellipse cx="26" cy="-6" rx="24" ry="14" fill="#7ec77e" transform="rotate(30 26 -6)"/>
    <!-- happy bud -->
    <circle cx="0" cy="-50" r="32" fill="#a8e0a8"/>
    <circle cx="-11" cy="-55" r="4" fill="#1a1a1a"/>
    <circle cx="11" cy="-55" r="4" fill="#1a1a1a"/>
    <path d="M-12 -42 Q 0 -32 12 -42" stroke="#1a1a1a" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <text x="0" y="120" fill="#8fc79b" font-size="34" font-weight="700" text-anchor="middle" direction="rtl">النَّباتُ سَعيد</text>
    <text x="0" y="160" fill="#c9d2db" font-size="22" text-anchor="middle" direction="rtl">حِمضِيٌّ قَليلًا</text>
  </g>

  <!-- ===== RIGHT: soap (alkaline) ===== -->
  <g transform="translate(980,200)">
    <rect x="-78" y="-34" width="156" height="68" rx="14" fill="#a8c8e8"/>
    <rect x="-78" y="-34" width="156" height="20" rx="14" fill="#c5d8eb" opacity="0.6"/>
    <ellipse cx="-46" cy="-58" rx="14" ry="10" fill="#d8e8f5" opacity="0.85"/>
    <ellipse cx="18" cy="-68" rx="10" ry="7" fill="#d8e8f5" opacity="0.85"/>
    <ellipse cx="50" cy="-50" rx="8" ry="6" fill="#d8e8f5" opacity="0.75"/>
    <text x="0" y="120" fill="#6f8fd8" font-size="34" font-weight="700" text-anchor="middle" direction="rtl">قَلَوِيّ</text>
    <text x="0" y="160" fill="#c9d2db" font-size="22" text-anchor="middle" direction="rtl">مِثلَ الصّابون</text>
  </g>

  <!-- horizontal gradient bar -->
  <rect x="120" y="400" width="960" height="60" rx="30" fill="url(#phbar)"/>

  <!-- arrow pointing down at the plant zone -->
  <path d="M600 380 L585 405 L615 405 Z" fill="#8fc79b"/>

  <text x="600" y="540" fill="#c9d2db" font-size="24" text-anchor="middle" direction="rtl">النَّباتاتُ تُحِبُّ الماءَ في المُنتَصَف،</text>
  <text x="600" y="572" fill="#c9d2db" font-size="24" text-anchor="middle" direction="rtl">قَريبًا قَليلًا مِنْ جِهَةِ الحامِض.</text>
</svg>
