<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hydroponics Water Quality Arabic</title>
<style>
:root { --bg:#1a1a1a; --fg:#f0f0f0; --accent:#4a9eff; --dim:rgba(255,255,255,0.6); }
* { box-sizing:border-box; margin:0; padding:0; }
html, body { height:100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  background: var(--bg); color: var(--fg);
  display: flex; flex-direction: column;
}
header { padding: 0.7rem 2rem 0.25rem; display:flex; flex-direction:column; gap:0.15rem; }
.doc-title { font-size: 0.9rem; font-weight: 500; opacity: 0.6; letter-spacing: 0.02em; }
.section-ribbon { font-size: 1.05rem; font-weight: 500; color: var(--accent); min-height: 1.4em; }
main {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 0.75rem 2rem; gap: 0.5rem; min-height: 0;
}
#stage {
  flex: 1; width: 100%; max-width: 1200px;
  display: flex; align-items: center; justify-content: center;
  background: #000; border-radius: 12px; overflow: hidden;
  min-height: 40vh; position: relative;
}
#stage img {
  max-width: 100%; max-height: 75vh; object-fit: contain;
  opacity: 0; transition: opacity 0.35s ease;
  transform-origin: center center;
}
/* When rotated 90 or 270 deg, image's pre-rotation width becomes the visible height. */
#stage img.rot-90, #stage img.rot-270 {
  max-width: 75vh; max-height: 92%;
}
#stage img.visible { opacity: 1; }
.fallback {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 2rem; gap: 1rem;
  color: var(--fg); width: 100%; height: 100%;
}
.fallback .section-big {
  font-size: 2.2rem; font-weight: 500; opacity: 0.85;
  max-width: 90%; line-height: 1.25;
}
.fallback .hint {
  font-size: 0.95rem; color: var(--dim); opacity: 0.6;
}
.overlay {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  width: 100%; height: 100%; padding: 2rem; gap: 1.5rem;
  background: linear-gradient(135deg, rgba(74,158,255,0.08), rgba(74,158,255,0.02));
}
.overlay .ov-title {
  font-size: 1.8rem; font-weight: 500; color: var(--accent); text-align: center;
}
.overlay .ov-lines {
  display: flex; flex-direction: column; gap: 0.85rem; align-items: center;
}
.overlay .ov-line {
  font-size: 1.7rem; font-weight: 400; opacity: 0.95;
  font-variant-numeric: tabular-nums;
}
#caption {
  font-size: 0.9rem; color: var(--dim);
  text-align: center; min-height: 1.2em; max-width: 1100px;
}
footer {
  padding: 0.75rem 2rem 1.25rem;
  display: flex; flex-direction: column; gap: 0.5rem;
  background: rgba(255,255,255,0.04);
  border-top: 1px solid rgba(255,255,255,0.06);
}
#scrubber {
  width: 100%; height: 5px; background: rgba(255,255,255,0.15);
  border-radius: 3px; cursor: pointer; position: relative;
}
#scrubber-fill {
  height: 100%; background: var(--accent); border-radius: 3px;
  width: 0%; pointer-events: none;
}
#scrubber-marks {
  position: absolute; top: 0; left: 0; right: 0; height: 100%;
  pointer-events: none;
}
.cue-mark {
  position: absolute; top: -3px; width: 2px; height: 11px;
  background: rgba(255,255,255,0.45); border-radius: 1px;
  cursor: pointer; pointer-events: auto;
}
.cue-mark::before {
  content: ""; position: absolute;
  top: -10px; bottom: -10px; left: -7px; right: -7px;
}
.cue-mark:hover { background: var(--accent); width: 3px; }
.cue-mark.overlay-mark { background: rgba(255,200,100,0.65); }
.cue-mark.overlay-mark:hover { background: rgb(255,200,100); }
.cue-mark.vocab-mark { background: rgba(199,155,240,0.7); }
.cue-mark.vocab-mark:hover { background: rgb(199,155,240); }
#scrubber-marks { pointer-events: none; }
#scrubber-marks .cue-mark { pointer-events: auto; }
/* Vocabulary card — color-coded to match the narration voices */
.vocab-card {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  width: 100%; height: 100%; padding: 2rem; gap: 0.9rem;
  background: linear-gradient(135deg, rgba(199,155,240,0.10), rgba(199,155,240,0.02));
}
.vocab-row {
  display: flex; align-items: baseline; gap: 0.9rem;
  font-size: 2rem; font-weight: 500;
}
.vocab-row .vocab-lang {
  font-size: 0.8rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.06em; opacity: 0.85;
  min-width: 2.2em; text-align: right;
}
.vocab-row .vocab-word { font-weight: 500; }
.vocab-lang-nl, .vocab-row.lang-nl .vocab-word { color: #f0a868; }
.vocab-lang-de, .vocab-row.lang-de .vocab-word { color: #7ec77e; }
.vocab-lang-en, .vocab-row.lang-en .vocab-word { color: #4a9eff; }
.vocab-lang-ar, .vocab-row.lang-ar .vocab-word { color: #c89bf0; }
.vocab-row.lang-nl .vocab-lang { color: #f0a868; }
.vocab-row.lang-de .vocab-lang { color: #7ec77e; }
.vocab-row.lang-en .vocab-lang { color: #4a9eff; }
.vocab-row.lang-ar .vocab-lang { color: #c89bf0; }
#cue-preview {
  position: fixed;
  z-index: 100;
  background: rgba(20,20,22,0.97);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 10px;
  padding: 8px;
  max-width: 280px;
  pointer-events: none;
  box-shadow: 0 8px 24px rgba(0,0,0,0.45);
  display: none;
  font-size: 0.82rem;
}
#cue-preview.visible { display: block; }
#cue-preview img {
  display: block;
  max-width: 100%;
  max-height: 160px;
  border-radius: 6px;
  margin-bottom: 6px;
}
#cue-preview img.rot-90, #cue-preview img.rot-270 {
  max-width: 160px; max-height: 100%;
}
#cue-preview .preview-caption {
  color: var(--fg); line-height: 1.3; opacity: 0.95;
}
#cue-preview .preview-time {
  color: var(--accent); font-variant-numeric: tabular-nums;
  font-size: 0.75rem; margin-top: 4px; opacity: 0.85;
}
#cue-preview .preview-overlay-title {
  color: rgb(255,200,100); font-weight: 500; margin-bottom: 4px;
}
#cue-preview .preview-overlay-line {
  opacity: 0.9; margin-bottom: 2px;
}
.controls {
  display: flex; align-items: center; justify-content: center;
  gap: 0.5rem; flex-wrap: wrap;
}
button {
  background: rgba(255,255,255,0.08);
  color: var(--fg);
  border: 1px solid rgba(255,255,255,0.18);
  padding: 0.5rem 0.9rem;
  border-radius: 8px;
  font-size: 0.92rem;
  cursor: pointer;
  transition: background 0.15s, transform 0.05s;
  font-family: inherit;
}
button:hover { background: rgba(255,255,255,0.16); }
button:active { transform: scale(0.97); }
button.primary {
  background: var(--accent); border-color: var(--accent);
  font-weight: 500; min-width: 80px;
}
button.primary:hover { background: #6db1ff; }
.time-info {
  font-size: 0.82rem; color: var(--dim); text-align: center;
  font-variant-numeric: tabular-nums;
}
.cue-counter {
  font-size: 0.82rem; color: var(--dim); text-align: center;
}
audio { display: none; }
@media (max-width: 600px) {
  header, footer, main { padding-left: 1rem; padding-right: 1rem; }
  button { padding: 0.45rem 0.7rem; font-size: 0.88rem; }
  .fallback .section-big { font-size: 1.5rem; }
  .overlay .ov-title { font-size: 1.3rem; }
  .overlay .ov-line { font-size: 1.2rem; }
}
</style>

const sections = [{"time": 36.125, "level": 2, "title": "١ — الأرقامُ الثَّلاثةُ التي تُقَرِّرُ النَّجاح"}, {"time": 118.35, "level": 2, "title": "٢ — لِماذا تَرتَفِعُ الحُموضةُ دائِمًا"}, {"time": 227.714, "level": 2, "title": "٣ — المُنَظِّمُ البِيكَرْبوناتيُّ — لِماذا ماءُ الصَّنبورِ صَبُور"}, {"time": 322.479, "level": 2, "title": "٤ — القِياس: جَولةٌ في مَمَرِّ أحواضِ السَّمَكِ بِمَتجَرِ رانزايْن"}, {"time": 349.229, "level": 3, "title": "٤·١ — صَفُّ أطقُمِ كولومبو أكواتِست — أداتُكَ الأساسيّة"}, {"time": 406.422, "level": 3, "title": "٤·٢ — الحُموضةُ والكي إتش — الاثنانِ اللذانِ تَحتاجُهُما فِعلًا"}, {"time": 477.272, "level": 3, "title": "٤·٣ — ماذا يَقيسُ اختبارُ الكي إتش حَقًّا"}, {"time": 537.619, "level": 3, "title": "٤·٤ — الجي إتش — مَجموعُ الكالسيومِ والمَغنيسيوم"}, {"time": 581.271, "level": 3, "title": "٤·٥ — شَرائِطُ الاختِبارِ المُتَعَدِّدة — لَقطاتٌ سَريعةٌ أقَلُّ دِقّة"}, {"time": 679.542, "level": 3, "title": "٤·٦ — طَقمُ المُختَبَرِ الاحتِرافيّ — مُبالَغةٌ لِحَجمِك"}, {"time": 717.129, "level": 3, "title": "٤·٧ — ما لا يَبيعُهُ رانزايْن — وأينَ تَجِدُه"}, {"time": 764.554, "level": 2, "title": "٥ — ضَبطُ الحُموضة — حِمْضُ السِّتريكِ هوَ الجَوابُ الصَّحيح"}, {"time": 768.854, "level": 3, "title": "٥·١ — ما يُقَدِّمُهُ رانزايْن — ولِماذا تَتَجاوَزُه"}, {"time": 824.198, "level": 3, "title": "٥·٢ — مَسحوقُ حِمْضِ السِّتريكِ مِنْ أكشِن — الجَوابُ الصَّحيح"}, {"time": 892.165, "level": 3, "title": "٥·٣ — المَحاليلُ المُرَكَّزةُ وبروتوكولُ الجُرعة"}, {"time": 984.24, "level": 2, "title": "٦ — الغِذاء — كَلِمةٌ سَريعةٌ عَمّا لا يَستَبدِلُهُ رانزايْن"}, {"time": 1081.04, "level": 2, "title": "٧ — حَرارةُ الماء — المُتَغَيِّرُ الذي يُسَبِّبُ أكبَرَ ضَرَرٍ الآن"}, {"time": 1100.827, "level": 3, "title": "٧·١ — الفِيزياء — تَأثيرانِ مُتَعاكِسان"}, {"time": 1176.715, "level": 3, "title": "٧·٢ — ماذا يَعني هٰذا لِبُرجِكَ الآن"}, {"time": 1219.336, "level": 3, "title": "٧·٣ — ماذا تَستَطيعُ أنْ تَفعَلَ حِيالَه"}, {"time": 1286.748, "level": 3, "title": "٧·٤ — تَشخيصٌ سَريع — هَلِ الحَرارةُ هيَ عُنُقُ الزُّجاجة؟"}, {"time": 1334.024, "level": 2, "title": "٨ — جَمعُ الأمرِ مَعًا — طَقمُ التَّسَوُّقِ الخاصُّ بِك"}, {"time": 1420.573, "level": 2, "title": "٩ — بروتوكولُ البَدءِ السَّريعِ لِخَزّانٍ جَديد"}, {"time": 1525.101, "level": 2, "title": "مَراجِعُ ذاتُ صِلة"}];
let currentCueIdx = -2;  // sentinel so initial render fires
let currentSectionIdx = -2;

const fmt = s => {
  if (!isFinite(s)) return "--:--";
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, "0")}`;
};

const findCueIndex = t => {
  let idx = -1;
  for (let i = 0; i < cues.length; i++) {
    if (cues[i].time <= t) idx = i; else break;
  }
  return idx;
};

const findSectionIndex = t => {
  let idx = -1;
  for (let i = 0; i < sections.length; i++) {
    if (sections[i].time <= t) idx = i; else break;
  }
  return idx;
};

const renderFallback = () => {
  const sec = currentSectionIdx >= 0 ? sections[currentSectionIdx] : null;
  stage.innerHTML = "";
  const div = document.createElement("div");
  div.className = "fallback";
  const big = document.createElement("div");
  big.className = "section-big";
  big.textContent = sec ? sec.title : "Beginning…";
  div.appendChild(big);
  stage.appendChild(div);
  caption.textContent = "";
};

const renderImage = cue => {
  stage.innerHTML = "";
  const img = new Image();
  img.alt = cue.caption || "";
  const rot = (cue.rotation || 0) % 360;
  if (rot === 90) img.classList.add("rot-90");
  else if (rot === 180) img.classList.add("rot-180");
  else if (rot === 270) img.classList.add("rot-270");
  if (rot) img.style.transform = `rotate(${rot}deg)`;
  img.onload = () => {
    stage.appendChild(img);
    requestAnimationFrame(() => img.classList.add("visible"));
  };
  img.src = cue.image;
  caption.textContent = cue.caption || "";
};

const renderOverlay = cue => {
  stage.innerHTML = "";
  const ov = document.createElement("div");
  ov.className = "overlay";
  if (cue.title) {
    const t = document.createElement("div");
    t.className = "ov-title";
    t.textContent = cue.title;
    ov.appendChild(t);
  }
  if (cue.lines && cue.lines.length) {
    const wrap = document.createElement("div");
    wrap.className = "ov-lines";
    for (const ln of cue.lines) {
      const l = document.createElement("div");
      l.className = "ov-line";
      l.textContent = ln;
      wrap.appendChild(l);
    }
    ov.appendChild(wrap);
  }
  stage.appendChild(ov);
  caption.textContent = "";
};

const renderVocab = cue => {
  stage.innerHTML = "";
  const card = document.createElement("div");
  card.className = "vocab-card";
  for (const e of (cue.entries || [])) {
    const row = document.createElement("div");
    row.className = "vocab-row lang-" + e.lang;
    const lang = document.createElement("span");
    lang.className = "vocab-lang vocab-lang-" + e.lang;
    lang.textContent = e.lang;
    const word = document.createElement("span");
    word.className = "vocab-word";
    word.textContent = e.word;
    if (e.lang === "ar") { word.dir = "rtl"; word.style.fontSize = "1.3em"; }
    row.appendChild(lang);
    row.appendChild(word);
    card.appendChild(row);
  }
  stage.appendChild(card);
  caption.textContent = "";
};

const setCue = (idx, sectionIdx) => {
  const sectionChanged = sectionIdx !== currentSectionIdx;
  const cueChanged = idx !== currentCueIdx;
  if (sectionChanged) {
    currentSectionIdx = sectionIdx;
    const sec = sectionIdx >= 0 ? sections[sectionIdx] : null;
    sectionRibbon.textContent = sec ? sec.title : "";
  }
  if (!cueChanged && !sectionChanged) return;
  // When cue is unchanged but only section advanced AND there is no active cue,
  // re-render fallback to pick up the new section title.
  if (!cueChanged && idx >= 0) return;

  currentCueIdx = idx;
  if (idx < 0) {
    renderFallback();
    cueCounter.textContent = "cue –";
    return;
  }
  const cue = cues[idx];
  if (cue.type === "overlay") renderOverlay(cue);
  else if (cue.type === "vocab") renderVocab(cue);
  else renderImage(cue);
  cueCounter.textContent = `cue ${idx + 1} / ${cues.length}`;
};

const cuePreview = document.getElementById("cue-preview");

const renderPreviewForCue = (cue) => {
  cuePreview.innerHTML = "";
  if (cue.type === "image") {
    const img = new Image();
    img.src = cue.image;
    img.alt = cue.caption || "";
    const rot = (cue.rotation || 0) % 360;
    if (rot === 90) img.classList.add("rot-90");
    else if (rot === 270) img.classList.add("rot-270");
    if (rot) img.style.transform = `rotate(${rot}deg)`;
    cuePreview.appendChild(img);
    if (cue.caption) {
      const cap = document.createElement("div");
      cap.className = "preview-caption";
      cap.textContent = cue.caption;
      cuePreview.appendChild(cap);
    }
  } else if (cue.type === "overlay") {
    if (cue.title) {
      const t = document.createElement("div");
      t.className = "preview-overlay-title";
      t.textContent = cue.title;
      cuePreview.appendChild(t);
    }
    for (const ln of (cue.lines || [])) {
      const l = document.createElement("div");
      l.className = "preview-overlay-line";
      l.textContent = ln;
      cuePreview.appendChild(l);
    }
  } else if (cue.type === "vocab") {
    for (const e of (cue.entries || [])) {
      const l = document.createElement("div");
      l.className = "preview-overlay-line vocab-lang-" + e.lang;
      l.textContent = e.lang + "  " + e.word;
      if (e.lang === "ar") l.dir = "rtl";
      cuePreview.appendChild(l);
    }
  }
  const tInfo = document.createElement("div");
  tInfo.className = "preview-time";
  tInfo.textContent = fmt(cue.time);
  cuePreview.appendChild(tInfo);
};

const positionPreviewAt = (mark) => {
  const rect = mark.getBoundingClientRect();
  cuePreview.classList.add("visible");
  // Measure after rendering, before final placement
  const pw = cuePreview.offsetWidth;
  const ph = cuePreview.offsetHeight;
  let left = rect.left + rect.width / 2 - pw / 2;
  left = Math.max(8, Math.min(window.innerWidth - pw - 8, left));
  let top = rect.top - ph - 10;
  if (top < 8) top = rect.bottom + 10;
  cuePreview.style.left = left + "px";
  cuePreview.style.top = top + "px";
};

const showPreview = (idx, mark) => {
  if (idx < 0 || idx >= cues.length) return;
  renderPreviewForCue(cues[idx]);
  positionPreviewAt(mark);
};

const hidePreview = () => {
  cuePreview.classList.remove("visible");
  cuePreview.innerHTML = "";
};

audio.addEventListener("loadedmetadata", () => {
  tTotal.textContent = fmt(audio.duration);
  for (let i = 0; i < cues.length; i++) {
    const cue = cues[i];
    const mark = document.createElement("div");
    mark.className = "cue-mark" + (cue.type === "overlay" ? " overlay-mark" : cue.type === "vocab" ? " vocab-mark" : "");
    mark.style.left = (100 * cue.time / audio.duration) + "%";
    mark.dataset.cueIndex = String(i);
    mark.title = (cue.caption || cue.title || "") + " — " + fmt(cue.time);
    mark.addEventListener("mouseenter", () => showPreview(i, mark));
    mark.addEventListener("mouseleave", hidePreview);
    mark.addEventListener("click", e => {
      e.stopPropagation();
      audio.currentTime = cue.time;
    });
    scrubberMarks.appendChild(mark);
  }
});

audio.addEventListener("timeupdate", () => {
  const t = audio.currentTime;
  scrubberFill.style.width = (100 * t / audio.duration) + "%";
  tCurrent.textContent = fmt(t);
  setCue(findCueIndex(t), findSectionIndex(t));
});

audio.addEventListener("play", () => playPause.textContent = "Pause");
audio.addEventListener("pause", () => playPause.textContent = "Play");
audio.addEventListener("ended", () => playPause.textContent = "Play");

playPause.addEventListener("click", () => {
  if (audio.paused) audio.play(); else audio.pause();
});

document.getElementById("back-10").addEventListener("click", () => {
  audio.currentTime = Math.max(0, audio.currentTime - 10);
});
document.getElementById("fwd-10").addEventListener("click", () => {
  audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 10);
});

document.getElementById("prev-cue").addEventListener("click", () => {
  const t = audio.currentTime;
  const idx = findCueIndex(t - 0.5);
  if (idx > 0) audio.currentTime = cues[idx - 1].time;
  else if (idx === 0) audio.currentTime = cues[0].time > 0.1 ? cues[0].time : 0;
  else if (cues.length > 0) audio.currentTime = 0;
});

document.getElementById("next-cue").addEventListener("click", () => {
  const idx = findCueIndex(audio.currentTime);
  if (idx + 1 < cues.length) audio.currentTime = cues[idx + 1].time;
  else if (audio.duration) audio.currentTime = audio.duration;
});

scrubber.addEventListener("click", e => {
  const rect = scrubber.getBoundingClientRect();
  const frac = (e.clientX - rect.left) / rect.width;
  if (audio.duration) audio.currentTime = frac * audio.duration;
});

document.addEventListener("keydown", e => {
  if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
  switch (e.code) {
    case "Space": e.preventDefault(); playPause.click(); break;
    case "ArrowLeft": document.getElementById("back-10").click(); break;
    case "ArrowRight": document.getElementById("fwd-10").click(); break;
    case "ArrowUp": e.preventDefault(); document.getElementById("prev-cue").click(); break;
    case "ArrowDown": e.preventDefault(); document.getElementById("next-cue").click(); break;
  }
});

// Initial render before audio loads
setCue(-1, -1);
</script>
